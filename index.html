<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>街区基準点ビューア</title>
    <link
      href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      <div id="banner" class="banner hidden" role="status"></div>
      <div id="panel-shell" class="panel-shell">
        <aside id="panel" class="panel">
          <header class="panel-header">
            <h1 class="panel-title">街区基準点</h1>
            <button
              id="panel-toggle"
              type="button"
              class="panel-toggle"
              aria-expanded="true"
              aria-controls="panel-body"
              aria-label="凡例を閉じる"
            >
              <span class="panel-toggle-bars" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </header>
          <div id="panel-body" class="panel-body">
            <h2 class="legend-heading">凡例</h2>
            <div id="legend"></div>
          </div>
        </aside>
      </div>
      <div id="status-bar" class="status-bar"></div>
      <div id="download-wrap" class="download-wrap hidden">
        <button id="download-btn" type="button" disabled>CSVダウンロード</button>
        <span id="download-hint" class="download-hint"></span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
